app-id: com.blizzard.BattleNet
sdk: org.freedesktop.Sdk
runtime: org.freedesktop.Platform
runtime-version: &runtime-version '23.08'
base: org.openwinecomponents.umu.umu-launcher
# base-version: stable-23.08
command: BattleNetWrapper
# rename-desktop-file: com.blizzard.BattleNet.desktop
# rename-icon: BattleNet
finish-args:
  - --allow=devel
  - --allow=multiarch
  - --device=all
  - --allow=bluetooth
  - --allow=per-app-dev-shm
  - --env=GAMEID=noid
  - --env=PATH=/app/bin:/app/utils/bin:/usr/bin:/usr/lib/extensions/vulkan/MangoHud/bin:/usr/lib/extensions/vulkan/gamescope/bin:/usr/lib/extensions/vulkan/OBSVkCapture/bin
  - --filesystem=xdg-data/lutris:rw
  - --filesystem=xdg-data/Steam:rw
  - --filesystem=xdg-data/applications:rw
  - --filesystem=~/.steam:rw
  - --filesystem=~/Games:rw
  - --filesystem=~/.local/share/Steam:rw
  - --filesystem=~/.var/app/com.valvesoftware.Steam:rw
  - --filesystem=~/.var/app/org.openwinecomponents.umu.umu-launcher:rw
  - --filesystem=home
  - --filesystem=xdg-documents
  - --filesystem=xdg-desktop
  - --filesystem=xdg-download
  - --env=TZ=
  - --unset-env=TZ
  - --env=LC_ADDRESS=C
  - --env=LC_COLLATE=C
  - --env=LC_MONETARY=C
  - --env=LC_MEASUREMENT=C
  - --env=LC_NAME=C
  - --env=LC_NUMERIC=C
  - --env=LC_TELEPHONE=C
  - --env=SDL_VIDEODRIVER=
  - --unset-env=SDL_VIDEODRIVER
  - --env=DBUS_FATAL_WARNINGS=0
  - --env=XDG_CONFIG_DIRS=/etc/xdg:/usr/lib/x86_64-linux-gnu/GL:/usr/lib/i386-linux-gnu/GL
  # Wine uses UDisks2 to enumerate disk drives
  - --system-talk-name=org.freedesktop.UDisks2
  # should fix access to SD card on the deck
  - --filesystem=/run/media
  # There are still quite a few users using /mnt/ for external drives
  - --filesystem=/mnt
  # should fix steamdeck controler navigation
  - --filesystem=/run/udev:ro
  # should fix discord rich presence
  - --filesystem=xdg-run/app/com.discordapp.Discord:create
  - --persist=.
  - --share=ipc
  - --socket=wayland
  - --socket=x11
  - --socket=pulseaudio
  - --share=network
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher
  # Required for bwrap to work
  - --talk-name=org.freedesktop.portal.Background
  # --- Steam ---
  # Pressure Vessel
  # See https://github.com/flathub/com.valvesoftware.Steam/commit/0538256facdb0837c33232bc65a9195a8a5bc750
  - --env=XDG_DATA_DIRS=/app/share:/usr/lib/extensions/vulkan/share:/usr/share:/usr/share/runtime/share:/run/host/user-share:/run/host/share:/usr/lib/pressure-vessel/overrides/share
inherit-extensions:
  - org.freedesktop.Platform.Compat.i386
  - org.freedesktop.Platform.GL32
  - org.freedesktop.Platform.ffmpeg-full
  - org.freedesktop.Platform.ffmpeg_full.i386
modules:
  - name: BattleNet
    buildsystem: simple
    sources:
      - type: file
        url: https://www.battle.net/download/getInstallerForGame?os=win&version=LIVE&gameProgram=BATTLENET_APP
        sha256: 002f33fee7b8a159058368b7e93e492931c4ca72e90660bdb2691bcd62fedd3c
        dest-filename: BattleNetSetup.exe
      - type: script
        commands:
          - |
            # echo "Setting up Discord rich presence"
            # for i in {0..9}; do
            #   test -S $XDG_RUNTIME_DIR/discord-ipc-$i ||
            #     ln -sf {app/com.discordapp.Discord,$XDG_RUNTIME_DIR}/discord-ipc-$i;
            # done

            # echo "Running wineboot --init"
            # wineboot --init

            # echo "Performing tweak(s)..."
            # echo "Disable winemenubuilder.exe..."
            # wine reg add "HKEY_CURRENT_USER\Software\Wine\DllOverrides" /v "winemenubuilder.exe" /d "" /f

            # echo "Disable crash dialog..."
            # wine reg add "HKEY_CURRENT_USER\Software\Wine\WineDbg" /v "ShowCrashDialog" /t "REG_DWORD" /d "00000000" /f

            echo "Launching BattleNetSetup.exe"
            umu-run /app/bin/BattleNetSetup.exe
        dest-filename: BattleNetWrapper
    build-commands:
      - |
        echo "Moving BattleNetSetup.exe to /app/bin"
        mv BattleNetSetup.exe /app/bin

        echo "Moving BattleNetWrapper to /app/bin"
        mv BattleNetWrapper /app/bin
